name: publish

# 發佈到 PyPI，採 trusted publishing（OIDC，免 API token）。
# 觸發：在 public repo weilung/claude-session-sync 開一個 GitHub Release（published）。
#
# 一次性設定（在 pypi.org 做，只做一次）：
#   PyPI → 你的專案 claude-code-session-sync → Publishing → Add a trusted publisher（GitHub）
#     Owner:            weilung
#     Repository name:  claude-session-sync   ← repo 沒改名，仍是這個
#     Workflow name:    publish.yml
#     Environment name: pypi
#   （專案還不存在時，改用 "pending publisher"：PyPI → Account → Publishing → 先登記，
#    首次成功發佈後 PyPI 會自動建立專案並綁定。）
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC) 需要；不需 PyPI token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # 重跑同版不報錯（idempotent）
